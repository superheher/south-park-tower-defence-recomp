# XenonRecomp config for South Park: Let's Go Tower Defense Play! (variant A).
# Paths are relative to this TOML's directory (south-park-recomp/varianta/).
# Register save/restore addresses cribbed from the RexGlue function table
# (generated/default/south_park_td_register.cpp); setjmp/longjmp from the RexGlue
# manifest (SEH-unwind-fix root-caused: setjmp=EH-hook dispatcher sub_8242EEA0,
# longjmp=RtlRestoreContext sub_8242EA70).
[main]
file_path = "../private/extracted/default.xex"
out_directory_path = "ppc"
switch_table_file_path = "sp_switch_tables.toml"

# Function-boundary overrides for jump-table dispatchers XenonAnalyse split at the computed-jump
# targets (the deferred function-boundary problem). Each spans the dispatch + all case bodies so the
# switch's gotos stay in-function. sub_821DC228 = a value-returning switch (dispatch 0x821DC228..240,
# table @0x821DC244, 22 case bodies 0x821DC29C..0x821DC3B0/blr) — boot crashed calling case-label
# 0x821DC29C as a function (null dispatch -> PC=0).
functions = [
    { address = 0x821DC228, size = 0x18C },
]

# --- register save/restore (RexGlue south_park_td_register.cpp) ---
savegprlr_14_address = 0x8242BE60
restgprlr_14_address = 0x8242BEB0
savefpr_14_address   = 0x8242CA40
restfpr_14_address   = 0x8242CA8C
savevmx_14_address   = 0x8242C4E0
restvmx_14_address   = 0x8242C778
savevmx_64_address   = 0x8242C574
restvmx_64_address   = 0x8242C80C

# --- setjmp / longjmp (RexGlue manifest) ---
setjmp_address  = 0x8242EEA0
longjmp_address = 0x8242EA70

# Optimizations OFF for the first recompilation (per XenonRecomp README: enable only
# after a successfully running recompilation).
skip_lr = false
skip_msr = false
ctr_as_local = false
xer_as_local = false
reserved_as_local = false
cr_as_local = false
non_argument_as_local = false
non_volatile_as_local = false
